<body>
<div class="container" id="app">
  <div id="installBanner">📲 点击安装到手机主屏幕</div>

  <!-- 登录界面 -->
  <div id="auth-screen">
    <div class="login-box" style="width:100%;">
      <h2>⚡ 我独自升级</h2>
      <input type="text" id="username" placeholder="用户名" autocomplete="username" inputmode="text" autocapitalize="none">
      <input type="password" id="password" placeholder="密码" autocomplete="current-password">
      <button type="button" id="loginBtn">登 录</button>
      <button type="button" id="regBtn" class="secondary">注 册 新 账 号</button>
      <div id="quickLoginArea" style="margin-top:8px;"></div>
      <p id="authMsg" style="text-align:center;margin-top:10px;min-height:20px;font-weight:bold;font-size:14px;"></p>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="main-screen" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <h2 style="color:#ff6b6b;margin:0;font-size:22px;">⚡ 我独自升级</h2>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button type="button" id="storageInfoBtn" class="small ghost" style="font-size:10px;">💾</button>
        <button type="button" id="logoutBtn" class="small ghost">退出</button>
      </div>
    </div>
    <p style="font-size:12px;opacity:0.8;margin:4px 0;">👤 <span id="myName"></span> | UID: <span id="myUid"></span></p>
    <div style="display:flex;gap:6px;margin:6px 0;flex-wrap:wrap;">
      <button id="weeklyReportBtn" class="secondary" style="flex:1;min-width:110px;">📈 本周统计</button>
      <button id="refreshReportBtn" class="small secondary" style="flex:1;min-width:70px;">🔄 刷新</button>
    </div>
    <div class="nav">
      <button type="button" class="active" data-panel="weight">⚖️体重</button>
      <button type="button" data-panel="strength">💪力量</button>
      <button type="button" data-panel="onerm">🏋️1PR</button>
      <button type="button" data-panel="physique">📷形体</button>
      <button type="button" data-panel="friends">👥朋友</button>
    </div>
    <div id="panel-container">
      <!-- 体重面板 -->
      <div id="weight-panel" class="panel">
        <div class="period-select"><select id="periodDropdown"><option value="7d">7天</option><option value="14d">14天</option><option value="30d">30天</option><option value="this_month">本月</option><option value="last_month">上月</option><option value="60d">60天</option><option value="90d">90天</option><option value="this_year">本年</option><option value="last_year">去年</option><option value="all" selected>全部</option></select></div>
        <div class="stats-card">
          <p style="margin-bottom:4px;font-weight:600;">📅 今日体重快速记录</p>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <input id="quickWeight" type="number" placeholder="体重 (kg)" step="0.1" style="flex:2;min-width:90px;" inputmode="decimal">
            <select id="quickPhase" style="flex:1;min-width:70px;"><option value="bulk">增肌期</option><option value="cut">减脂期</option></select>
          </div>
          <button id="quickRecordBtn">记录今日体重</button>
        </div>
        <div class="collapsible stats-card" id="manualDateToggle" style="font-size:14px;">📆 手动选择日期记录 <span style="font-size:11px;opacity:0.7;">(点击展开)</span></div>
        <div class="collapsible-content">
          <div class="stats-card">
            <input type="date" id="weightDate">
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <input type="number" id="weightValue" placeholder="体重 (kg)" step="0.1" style="flex:2;min-width:90px;" inputmode="decimal">
              <select id="weightPhaseSelect" style="flex:1;min-width:70px;"><option value="bulk">增肌期</option><option value="cut">减脂期</option></select>
            </div>
            <button id="addWeightBtn">记录体重</button>
          </div>
        </div>
        <div class="chart-wrapper"><div id="weightChartDiv"></div></div>
        <div id="weightSuggestion" class="stats-card" style="color:#ff9f43;font-size:13px;"></div>
        <div class="file-upload-wrapper">
          <label for="xlsxUpload" class="file-btn">📂 上传 Excel 批量导入</label>
          <input type="file" id="xlsxUpload" accept=".xlsx,.xls">
          <button id="mapXlsxBtn" class="small download-btn" disabled>映射替换</button>
          <button id="downloadTemplateBtn" class="small download-btn">⬇️ 模板</button>
        </div>
      </div>

      <!-- 力量面板 -->
      <div id="strength-panel" class="panel hidden">
        <div class="week-navigator">
          <button id="prevWeekBtn" class="small">◀ 上周</button>
          <span id="currentWeekLabel" style="font-size:13px;font-weight:600;"></span>
          <button id="nextWeekBtn" class="small">下周 ▶</button>
          <button id="todayStrengthBtn" class="small">今天</button>
        </div>
        <div class="week-grid" id="weekGrid"></div>
        <div style="display:flex;gap:6px;margin:8px 0;">
          <div id="strengthWeekBtn" class="phase-btn-small strength">🔥 增力周</div>
          <div id="volumeWeekBtn" class="phase-btn-small volume">💧 容量周</div>
        </div>
        <div id="dayDetail" style="margin-top:10px;"></div>
      </div>

      <!-- 1PR面板 -->
      <div id="onerm-panel" class="panel hidden">
        <h3>最大1PR推算</h3>
        <select id="prMuscleGroup"><option value="">选择肌群</option><option value="胸部">胸部</option><option value="背部">背部</option><option value="腿部">腿部</option><option value="肩部">肩部</option><option value="手臂">手臂</option></select>
        <select id="prExercise" class="hidden"></select>
        <button id="addPrExerciseBtn" class="small secondary hidden">+ 添加动作</button>
        <input type="number" id="repsInput" placeholder="完成的次数" inputmode="numeric">
        <input type="number" id="weightInput" placeholder="使用的重量 (kg)" inputmode="decimal">
        <select id="prFormula" style="margin:6px 0;">
          <option value="epley" selected>Epley (1+次数/30)</option>
          <option value="brzycki">Brzycki (36/(37-次数))</option>
          <option value="lombardi">Lombardi (次数^0.1)</option>
          <option value="mayhew">Mayhew</option>
          <option value="lander">Lander</option>
        </select>
        <button id="calc1RM">计 算</button>
        <p id="rmResult" style="text-align:center;font-size:30px;margin-top:10px;color:#ff6b6b;font-weight:700;"></p>
        <p id="formulaUsed" style="text-align:center;color:#aaa;font-size:13px;"></p>
      </div>

      <!-- 形体面板 -->
      <div id="physique-panel" class="panel hidden">
        <div class="week-navigator">
          <button id="physiquePrevWeek" class="small">◀ 上周</button>
          <span id="physiqueWeekLabel" style="font-size:13px;font-weight:600;"></span>
          <button id="physiqueNextWeek" class="small">下周 ▶</button>
          <button id="todayPhysiqueBtn" class="small">今天</button>
        </div>
        <div class="week-grid" id="physiqueWeekGrid"></div>
        <input type="file" id="physiqueImageUpload" accept="image/*" multiple style="display:none;">
        <input type="hidden" id="physiqueTargetDate">
        <div id="physiqueUploadStatus" style="text-align:center;margin-top:6px;color:#aaa;font-size:12px;"></div>
      </div>

      <!-- 朋友面板 -->
      <div id="friends-panel" class="panel hidden">
        <h3>朋友数据</h3>
        <input type="text" id="friendUidInput" placeholder="输入好友UID" inputmode="numeric" style="text-align:center;">
        <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
          <button id="addFriendBtn" style="flex:1;min-width:90px;">添加并查看</button>
          <button id="refreshFriendDataBtn" class="small secondary" style="flex:1;min-width:90px;">刷新当前好友</button>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
          <button id="exportMyDataBtn" class="small secondary">📤 复制数据</button>
          <button id="exportMyDataFileBtn" class="small secondary">💾 导出文件</button>
          <button id="importFriendDataBtn" class="small secondary">📥 导入好友数据</button>
        </div>
        <div id="friendList" class="stats-card" style="margin-top:6px;"></div>
        <div id="friendData" class="stats-card" style="margin-top:10px;display:none;"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
  (function() {
    // PWA 安装
    let deferredPrompt = null;
    const installBanner = document.getElementById('installBanner');

    // 本周统计
    function generateReportContent() {
      if (!currentUser) return '<p>请先登录</p>';
      const today = formatDate(new Date()); const thisMonday = getMonday(today); const lastMonday = addWeek(thisMonday, -1);
      const thisPlan = currentUser.weeklyPlans[thisMonday] || { days:{}, weekType:null };
      const thisWeekType = thisPlan.weekType;
      let compareMonday = lastMonday;
      if (thisWeekType) {
        const allMondays = Object.keys(currentUser.weeklyPlans).filter(d=>d<thisMonday).sort((a,b)=>b.localeCompare(a));
        for (let d of allMondays) { if (currentUser.weeklyPlans[d].weekType===thisWeekType) { compareMonday = d; break; } }
      }
      const comparePlan = currentUser.weeklyPlans[compareMonday] || { days:{} };
      function aggregate(plan) {
        const res={}; for(let i=0;i<7;i++){ const day=plan.days[i]||{muscles:[]}; if(!day.muscles) continue;
          day.muscles.forEach(m=>{ if(!m.muscleGroup||m.muscleGroup==='休息') return; if(!res[m.muscleGroup]) res[m.muscleGroup]={};
            (m.exercises||[]).forEach(e=>{ if(!res[m.muscleGroup][e.name]) res[m.muscleGroup][e.name]={sets:0,totalWeight:0}; res[m.muscleGroup][e.name].sets+=e.sets; res[m.muscleGroup][e.name].totalWeight+=e.weight*e.sets; }); }); } return res;
      }
      const thisData = aggregate(thisPlan), compareData = aggregate(comparePlan);
      let html = '<h3>📊 本周详细周报</h3>';
      const thisWeekW = currentUser.weightRecords.filter(r=>r.date>=thisMonday), lastWeekW = currentUser.weightRecords.filter(r=>r.date>=lastMonday&&r.date<thisMonday);
      const avgThis = thisWeekW.length ? (thisWeekW.reduce((s,r)=>s+r.weight,0)/thisWeekW.length).toFixed(1) : null;
      const avgLast = lastWeekW.length ? (lastWeekW.reduce((s,r)=>s+r.weight,0)/lastWeekW.length).toFixed(1) : null;
      html += `<p>体重：本周平均 <b>${avgThis||'-'} kg</b>`; if(avgLast) html += `，上周 ${avgLast} kg`; html+='</p><h4>💪 训练对比</h4>';
      const allMuscles = new Set([...Object.keys(thisData),...Object.keys(compareData)]);
      if(allMuscles.size===0){ html+='<p>本周无训练记录</p>'; } else {
        html+='<table class="stats-table"><tr><th>肌群</th><th>动作</th><th>组数</th><th>均重</th><th>组变</th><th>重变</th></tr>';
        allMuscles.forEach(mg=>{
          const thisM=thisData[mg]||{}, compM=compareData[mg]||{}; const exs=new Set([...Object.keys(thisM),...Object.keys(compM)]);
          html+=`<tr class="muscle-group-header"><td colspan="6">${escapeHtml(mg)}</td></tr>`;
          exs.forEach(ex=>{
            const cur=thisM[ex]||{sets:0,totalWeight:0}, prev=compM[ex]||{sets:0,totalWeight:0};
            const curAvg=cur.sets?(cur.totalWeight/cur.sets).toFixed(1):'0', prevAvg=prev.sets?(prev.totalWeight/prev.sets).toFixed(1):'0';
            let setChange='-', weightChange='-';
            if(prev.sets>0){ const sp=((cur.sets-prev.sets)/prev.sets*100).toFixed(0); setChange=(sp>0?'+':'')+sp+'%'; const wp=((parseFloat(curAvg)-parseFloat(prevAvg))/parseFloat(prevAvg)*100).toFixed(0); weightChange=(wp>0?'+':'')+wp+'%'; }
            else if(cur.sets>0){ setChange='新'; weightChange='新'; }
            html+=`<tr><td></td><td>${escapeHtml(ex)}</td><td>${cur.sets}</td><td>${curAvg}</td><td>${setChange}</td><td>${weightChange}</td></tr>`;
          });
        });
        html+='</table>';
      }
      html+=`<p style="margin-top:8px;">对比基准：${thisWeekType==='strength'?'增力周':thisWeekType==='volume'?'容量周':'上周'} (${compareMonday})</p>`;
      return html;
    }

    }

    function showDayDetail(dayIdx){
      const plan=getPlan(currentStrengthMonday); if(!plan.days[dayIdx]) plan.days[dayIdx]={muscles:[]}; const day=plan.days[dayIdx]; if(!day.muscles) day.muscles=[];
      const container=document.getElementById('dayDetail');
      let html=`<h4>${['周一','周二','周三','周四','周五','周六','周日'][dayIdx]}</h4>
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          <button id="addMuscleBtn" class="small secondary" style="flex:1;">+ 添加肌群</button>
          <button id="restDayBtn" class="small secondary" style="flex:1;">🛌 休息日</button>
        </div>`;
      day.muscles.forEach((m,i) => html += renderMuscleBlock(m,i));
      container.innerHTML = html;
      container.scrollIntoView({behavior:'smooth',block:'nearest'});
      document.getElementById('addMuscleBtn').addEventListener('click', ()=>{ day.muscles.push({muscleGroup:'',exercises:[]}); save(); renderStrengthWeek(); showDayDetail(dayIdx); });
      document.getElementById('restDayBtn').addEventListener('click', ()=>{ day.muscles=[]; save(); renderStrengthWeek(); showDayDetail(dayIdx); showToast('休息日'); });
      document.querySelectorAll('.remove-muscle-btn').forEach(b=>b.addEventListener('click',function(){ const i=+this.dataset.midx; day.muscles.splice(i,1); save(); renderStrengthWeek(); showDayDetail(dayIdx); }));
      day.muscles.forEach((m,i)=>{
        const sel=document.getElementById(`groupSel-${i}`); if(sel){ sel.value=m.muscleGroup||''; sel.addEventListener('change',function(){ m.muscleGroup=this.value; save(); renderStrengthWeek(); showDayDetail(dayIdx); }); }
        const area=document.getElementById(`exArea-${i}`); if(area) renderExerciseArea(area, m, i);
      });
    }

    function renderMuscleBlock(muscle, idx){
      return `<div class="muscle-block" id="muscle-${idx}">
        <div style="display:flex;align-items:center;gap:6px;">
          <select id="groupSel-${idx}" style="flex:1;margin:0;"><option value="">选择肌群</option><option value="胸部">胸部</option><option value="背部">背部</option><option value="腿部">腿部</option><option value="肩部">肩部</option><option value="手臂">手臂</option></select>
          <button class="small toggle-ex-list-btn" data-target="exArea-${idx}" style="min-height:30px;width:30px;">▼</button>
          <button class="small remove-muscle-btn delete-muscle-btn" data-midx="${idx}" style="margin:0;">删除</button>
        </div>
        <div id="exArea-${idx}" class="exercise-area"></div>
      </div>`;
    }

    function renderExerciseArea(container, muscle, mIdx){
      let html = '';
      if(muscle.muscleGroup && muscle.muscleGroup!=='休息'){
        const base = exerciseLibrary[muscle.muscleGroup]||[];
        const custom = (currentUser.customExercises&&currentUser.customExercises[muscle.muscleGroup])?currentUser.customExercises[muscle.muscleGroup]:[];
        const all = [...new Set([...base,...custom])];
        html += `<div class="ex-list-container" id="exList-${mIdx}"><table class="ex-table"><thead><tr><th>动作</th><th>重量</th><th>次数</th><th>组数</th><th></th></tr></thead><tbody>`;
        (muscle.exercises||[]).forEach((e,ei)=> html += `<tr><td>${escapeHtml(e.name)}</td><td>${e.weight}</td><td>${e.reps}</td><td>${e.sets}</td><td style="display:flex;gap:2px;"><button class="small modEx" data-midx="${mIdx}" data-eidx="${ei}" style="font-size:10px;">改</button><button class="small delEx" data-midx="${mIdx}" data-eidx="${ei}" style="font-size:10px;">删</button></td></tr>`);
        html += `</tbody></table></div>`;
        html += `<button class="small show-add-btn" id="showAdd-${mIdx}">+ 新增动作</button>`;
        html += `<div id="inputArea-${mIdx}" style="display:none; margin-top:6px;">
          <div style="display:flex;gap:4px;"><select id="exSel-${mIdx}" style="flex:1;font-size:12px;"><option value="">选择动作</option>${all.map(e=>'<option>'+e+'</option>').join('')}</select><button class="small add-custom-btn" data-midx="${mIdx}">+</button></div>
          <div style="display:flex;gap:3px;margin:4px 0;"><input id="wt-${mIdx}" placeholder="重量" type="number" step="0.5" style="flex:1;"><input id="rep-${mIdx}" placeholder="次数" type="number" style="flex:1;"><input id="set-${mIdx}" placeholder="组数" type="number" style="flex:1;"></div>
          <button class="small add-ex-btn" data-midx="${mIdx}" style="margin-top:4px;">添加动作</button>
        </div>`;
      }
      container.innerHTML = html;
      if(!muscle.muscleGroup||muscle.muscleGroup==='休息') return;

      const toggleBtn = document.querySelector(`.toggle-ex-list-btn[data-target="exArea-${mIdx}"]`);
      const exList = document.getElementById(`exList-${mIdx}`);
      if(toggleBtn && exList) {
        toggleBtn.addEventListener('click', ()=>{
          const isHidden = exList.style.display === 'none';
          exList.style.display = isHidden ? '' : 'none';
          toggleBtn.textContent = isHidden ? '▼' : '▶';
        });
      }

      const showAdd = document.getElementById(`showAdd-${mIdx}`);
      const inputArea = document.getElementById(`inputArea-${mIdx}`);
      if(showAdd && inputArea) {
        showAdd.addEventListener('click', function(e){
          e.stopPropagation();
          const isVisible = inputArea.style.display === 'block';
          if (isVisible) {
            inputArea.style.display = 'none';
            showAdd.textContent = '+ 新增动作';
          } else {
            inputArea.style.display = 'block';
            showAdd.textContent = '取消添加';
          }
        });
      }

      document.querySelector(`.add-custom-btn[data-midx="${mIdx}"]`)?.addEventListener('click', ()=>{
        const n = prompt('新动作名称：'); if(n?.trim()){
          if(!currentUser.customExercises) currentUser.customExercises={};
          if(!currentUser.customExercises[muscle.muscleGroup]) currentUser.customExercises[muscle.muscleGroup]=[];
          if(!currentUser.customExercises[muscle.muscleGroup].includes(n.trim())){ currentUser.customExercises[muscle.muscleGroup].push(n.trim()); save(); renderExerciseArea(container,muscle,mIdx); }
        }
      });
      document.querySelector(`.add-ex-btn[data-midx="${mIdx}"]`)?.addEventListener('click', ()=>{
        const s=document.getElementById(`exSel-${mIdx}`), w=document.getElementById(`wt-${mIdx}`), r=document.getElementById(`rep-${mIdx}`), st=document.getElementById(`set-${mIdx}`);
        if(!s||!w||!r||!st) return; const name=s.value, weight=parseFloat(w.value), reps=parseInt(r.value), sets=parseInt(st.value);
        if(!name||isNaN(weight)||isNaN(reps)||isNaN(sets)) return showToast('完整填写');
        if(!muscle.exercises) muscle.exercises=[];
        muscle.exercises.push({name,weight,reps,sets}); save();
        if(inputArea) inputArea.style.display = 'none';
        if(showAdd) showAdd.textContent = '+ 新增动作';
        renderExerciseArea(container,muscle,mIdx);
      });
      document.querySelectorAll(`.modEx[data-midx="${mIdx}"]`).forEach(b=>b.addEventListener('click',function(){
        const ei=+this.dataset.eidx; const ex=muscle.exercises[ei]; const nw=prompt('新重量',ex.weight), nr=prompt('新次数',ex.reps), ns=prompt('新组数',ex.sets);
        if(nw&&!isNaN(+nw)&&nr&&!isNaN(+nr)&&ns&&!isNaN(+ns)){ ex.weight=+nw; ex.reps=+nr; ex.sets=+ns; save(); renderExerciseArea(container,muscle,mIdx); }
      }));
      document.querySelectorAll(`.delEx[data-midx="${mIdx}"]`).forEach(b=>b.addEventListener('click',function(){
        const ei=+this.dataset.eidx; muscle.exercises.splice(ei,1); save(); renderExerciseArea(container,muscle,mIdx);
      }));
    }

    // 1PR
    const formulas={epley:(w,r)=>w*(1+r/30),brzycki:(w,r)=>w*(36/(37-r)),lombardi:(w,r)=>w*Math.pow(r,0.1),mayhew:(w,r)=>100*w/(101.3-2.67123*r),lander:(w,r)=>100*w/(101.3-2.67123*r)};
    document.getElementById('prMuscleGroup').addEventListener('change',function(){const mg=this.value;const s=document.getElementById('prExercise'),a=document.getElementById('addPrExerciseBtn');if(!mg){s.classList.add('hidden');a.classList.add('hidden');return;}s.classList.remove('hidden');a.classList.remove('hidden');updatePrList(mg);});
    function updatePrList(mg){const s=document.getElementById('prExercise');const base=exerciseLibrary[mg]||[],cust=(currentUser.customExercises&&currentUser.customExercises[mg])?currentUser.customExercises[mg]:[];s.innerHTML='<option value="">选择动作</option>'+[...new Set([...base,...cust])].map(e=>'<option>'+e+'</option>').join('');}
    document.getElementById('addPrExerciseBtn').addEventListener('click',()=>{const mg=document.getElementById('prMuscleGroup').value;if(!mg)return;const n=prompt('新动作：');if(n?.trim()){if(!currentUser.customExercises)currentUser.customExercises={};if(!currentUser.customExercises[mg])currentUser.customExercises[mg]=[];if(!currentUser.customExercises[mg].includes(n.trim())){currentUser.customExercises[mg].push(n.trim());save();updatePrList(mg);}}});
    document.getElementById('calc1RM').addEventListener('click',()=>{const w=parseFloat(document.getElementById('weightInput').value),r=parseInt(document.getElementById('repsInput').value);if(isNaN(w)||isNaN(r)||r<1)return showToast('有效值');const rm=formulas[document.getElementById('prFormula').value](w,r).toFixed(1);document.getElementById('rmResult').textContent='💥 '+rm+' kg';});

    // 形体面板
    let currentPhysiqueMonday = getMonday(formatDate(new Date()));
    function setPhysiqueMonday(d){ currentPhysiqueMonday=d; renderPhysiquePanel(); }
    document.getElementById('physiquePrevWeek').addEventListener('click',()=>setPhysiqueMonday(addWeek(currentPhysiqueMonday,-1)));
    document.getElementById('physiqueNextWeek').addEventListener('click',()=>setPhysiqueMonday(addWeek(currentPhysiqueMonday,1)));
    document.getElementById('todayPhysiqueBtn').addEventListener('click',()=>setPhysiqueMonday(getMonday(formatDate(new Date()))));
    async function renderPhysiquePanel(){
      document.getElementById('physiqueWeekLabel').textContent=currentPhysiqueMonday+' 周'; const grid=document.getElementById('physiqueWeekGrid'); grid.innerHTML='';
      const today=formatDate(new Date()), days=['一','二','三','四','五','六','日'];
      for(let i=0;i<7;i++){ const d=new Date(currentPhysiqueMonday+'T00:00:00'); d.setDate(d.getDate()+i); const ds=formatDate(d); const key='physique_'+ds; const imgs=await getUserImages(currentUser,key); const lm=getMonthOffset(ds,-1), t3=getMonthOffset(ds,-3); const lmgs=await getUserImages(currentUser,'physique_'+lm), t3gs=await getUserImages(currentUser,'physique_'+t3); const cell=document.createElement('div'); cell.className='day-cell'; if(ds===today) cell.classList.add('today'); let h=`<strong>周${days[i]}</strong><br><span style="font-size:8px;">${ds.slice(5)}</span><br>`; if(imgs.length) h+=`<img src="${imgs[0]}" class="img-thumb-small" style="width:24px;"> `; else h+='<span style="color:#555;">-</span> '; h+=`<button class="small" style="padding:1px 4px;font-size:8px;">📷</button><br><div class="physique-row"><span class="physique-label">上月</span>`; if(lmgs.length) h+=`<img src="${lmgs[0]}" class="img-thumb-small" data-date="${lm}">`; else h+='<span style="color:#555;">无</span>'; h+=`</div><div class="physique-row"><span class="physique-label">3月</span>`; if(t3gs.length) h+=`<img src="${t3gs[0]}" class="img-thumb-small" data-date="${t3}">`; else h+='<span style="color:#555;">无</span>'; h+=`</div>`; cell.innerHTML=h; cell.querySelector('button').addEventListener('click',e=>{e.stopPropagation();document.getElementById('physiqueTargetDate').value=ds;document.getElementById('physiqueImageUpload').click();}); if(imgs.length){ cell.querySelector(`img[src="${imgs[0]}"]`)?.addEventListener('click',e=>{e.stopPropagation();showPhysiqueViewer(ds,imgs,0);}); } cell.querySelectorAll('.img-thumb-small[data-date]').forEach(img=>img.addEventListener('click',async e=>{e.stopPropagation();const td=e.target.dataset.date;const arr=await getUserImages(currentUser,'physique_'+td);if(arr.length)showPhysiqueViewer(td,arr,0);})); grid.appendChild(cell); }
    }
    document.getElementById('physiqueImageUpload').addEventListener('change', async function(e){
      const files=Array.from(e.target.files); if(!files.length) return; const ds=document.getElementById('physiqueTargetDate').value; if(!ds) return;
      const status=document.getElementById('physiqueUploadStatus'); status.textContent='压缩中...'; const key='physique_'+ds; const exist=await getUserImages(currentUser,key);
      const proms=files.map(f=>new Promise((resolve,reject)=>{
        if(f.size>15*1024*1024){reject(new Error('>15MB'));return;} const r=new FileReader(); r.onload=ev=>{const img=new Image();img.onload=()=>{if(img.width>600){const c=document.createElement('canvas');c.width=600;c.height=Math.round(img.height*(600/img.width));c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',0.65));}else resolve(ev.target.result);};img.onerror=()=>resolve(ev.target.result);img.src=ev.target.result;};r.onerror=reject;r.readAsDataURL(f);}));
      try{const res=await Promise.all(proms);const all=[...exist,...res];await setUserImages(currentUser,key,all);save();renderPhysiquePanel();status.textContent='✅ 完成';setTimeout(()=>status.textContent='',1500);}catch(err){showToast('上传失败');} e.target.value='';
    });
    function showPhysiqueViewer(dateStr,images,idx){
      const modal=document.createElement('div');modal.className='modal';
      modal.innerHTML=`<div class="modal-content" style="text-align:center;"><p>${dateStr}</p><div class="image-viewer"><img src="${images[idx]}" id="vImg"><div class="image-nav"><button id="prevBtn" ${idx===0?'disabled':''}>◀</button><span>${idx+1}/${images.length}</span><button id="nextBtn" ${idx===images.length-1?'disabled':''}>▶</button></div><div style="display:flex;gap:6px;margin-top:8px;justify-content:center;"><button id="repBtn" class="small">替换</button><button id="delBtn" class="small">删除</button><button id="clsBtn" class="small secondary">关闭</button></div><input type="file" id="repFile" accept="image/*" style="display:none;"></div></div>`;
      document.body.appendChild(modal); const close=()=>modal.remove(); modal.addEventListener('click',e=>{if(e.target===modal)close();}); document.getElementById('clsBtn').addEventListener('click',close);
      const update=async()=>{const arr=await getUserImages(currentUser,'physique_'+dateStr);document.getElementById('vImg').src=arr[idx];document.getElementById('prevBtn').disabled=idx===0;document.getElementById('nextBtn').disabled=idx>=arr.length-1;document.querySelector('.image-nav span').textContent=`${idx+1}/${arr.length}`;};
      document.getElementById('prevBtn').addEventListener('click',()=>{if(idx>0){idx--;update();}}); document.getElementById('nextBtn').addEventListener('click',()=>{if(idx<images.length-1){idx++;update();}});
      document.getElementById('repBtn').addEventListener('click',()=>document.getElementById('repFile').click());
      document.getElementById('repFile').addEventListener('change',async function(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=async ev=>{const arr=await getUserImages(currentUser,'physique_'+dateStr);arr[idx]=ev.target.result;await setUserImages(currentUser,'physique_'+dateStr,arr);save();update();};reader.readAsDataURL(file);});
      document.getElementById('delBtn').addEventListener('click',async()=>{const arr=await getUserImages(currentUser,'physique_'+dateStr);arr.splice(idx,1);if(!arr.length)await deleteUserImages(currentUser,'physique_'+dateStr);else await setUserImages(currentUser,'physique_'+dateStr,arr);save();const upd=await getUserImages(currentUser,'physique_'+dateStr);if(upd.length){if(idx>=upd.length)idx=upd.length-1;update();}else{close();renderPhysiquePanel();}});
    }

    // 朋友面板
    function renderFriendList(){
      const list=document.getElementById('friendList'); if(!currentUser?.friends.length){ list.innerHTML='<p style="text-align:center;color:#888;">暂无好友</p>'; document.getElementById('friendData').style.display='none'; return; }
      let h='<h4>好友</h4>'; currentUser.friends.forEach(uid=>{const u=allUsers[uid];h+=`<div class="friend-list-item"><span>${u?escapeHtml(u.username):'未知'} (${uid})</span><div><button class="small viewFriendBtn" data-uid="${uid}">查看</button><button class="small hideFriendBtn">隐藏</button></div></div>`;});
      list.innerHTML=h; document.querySelectorAll('.viewFriendBtn').forEach(b=>b.addEventListener('click',function(){currentFriendUid=this.dataset.uid;displayFriendReport(currentFriendUid);})); document.querySelectorAll('.hideFriendBtn').forEach(b=>b.addEventListener('click',()=>document.getElementById('friendData').style.display='none'));
      if(currentFriendUid && currentUser.friends.includes(currentFriendUid)) displayFriendReport(currentFriendUid);
    }
    document.getElementById('exportMyDataBtn').addEventListener('click',()=>{if(!currentUser)return;const json=JSON.stringify(currentUser);const encoded=utf8ToBase64(json);navigator.clipboard.writeText(encoded).then(()=>showToast('已复制')).catch(()=>{const ta=document.createElement('textarea');ta.value=encoded;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制');});});
    document.getElementById('exportMyDataFileBtn').addEventListener('click',()=>{if(!currentUser)return;const blob=new Blob([JSON.stringify(currentUser)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`solo_${currentUser.username}.json`;a.click();});
    document.getElementById('importFriendDataBtn').addEventListener('click',()=>{const encoded=prompt('粘贴好友数据：');if(!encoded)return;try{const json=base64ToUtf8(encoded);const imp=JSON.parse(json);if(!imp.uid||!imp.username)throw new Error();allUsers[imp.uid]=imp;save();showToast('导入成功');renderFriendList();}catch(e){showToast('格式错误');}});
    document.getElementById('addFriendBtn').addEventListener('click',()=>{const uid=document.getElementById('friendUidInput').value.trim();if(!uid)return showToast('输入UID');if(uid===currentUser.uid)return showToast('不能添加自己');if(!currentUser.friends.includes(uid)){currentUser.friends.push(uid);save();showToast('已添加');renderFriendList();} currentFriendUid=uid;displayFriendReport(uid);});
    document.getElementById('refreshFriendDataBtn').addEventListener('click',()=>{if(currentFriendUid)displayFriendReport(currentFriendUid);else showToast('先选择好友');});
    function displayFriendReport(uid){const u=allUsers[uid];const c=document.getElementById('friendData');if(!u){c.innerHTML='<p>好友暂无数据</p>';c.style.display='block';return;}c.innerHTML=`<h3>${escapeHtml(u.username)} 周报</h3><p>体重记录${u.weightRecords.length}条</p>`;c.style.display='block';}

    // 登录注册
    document.getElementById('loginBtn').addEventListener('click',()=>{
      const un=document.getElementById('username').value.trim(), pw=document.getElementById('password').value;
      if(!un||!pw) return showAuthMsg('请输入用户名密码');
      const user=Object.values(allUsers).find(u=>u.username===un&&u.password===pw);
      if(!user) return showAuthMsg('用户名或密码错误');
      currentUser=user; addLoginHistory(user.username,user.uid); showMain();
    });
    document.getElementById('regBtn').addEventListener('click',()=>{
      const un=document.getElementById('username').value.trim(), pw=document.getElementById('password').value;
      if(!un||!pw) return showAuthMsg('请输入用户名密码');
      if(un.length<2) return showAuthMsg('用户名至少2字符');
      if(pw.length<3) return showAuthMsg('密码至少3位');
      if(Object.values(allUsers).some(u=>u.username===un)) return showAuthMsg('用户名已存在');
      const uid=generateUID(); allUsers[uid]={uid,username:un,password:pw,weightRecords:[],weeklyPlans:{},friends:[],customExercises:{}};
      save(); showAuthMsg('✅ 注册成功！UID: '+uid, false);
      document.getElementById('username').value=''; document.getElementById('password').value='';
    });
    document.getElementById('logoutBtn').addEventListener('click',()=>{
      currentUser=null; localStorage.removeItem('lastLoggedUID_v2');
      document.getElementById('auth-screen').classList.remove('hidden');
      document.getElementById('main-screen').classList.add('hidden');
    });

    document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>switchPanel(b.dataset.panel)));
    const lastUID = localStorage.getItem('lastLoggedUID_v2');
    if(lastUID && allUsers[lastUID]){ currentUser = allUsers[lastUID]; showMain(); }
    window.addEventListener('beforeunload', ()=>{ if(currentUser) localStorage.setItem('lastLoggedUID_v2', currentUser.uid); saveAllUsers(); });
    setInterval(()=>{ if(currentUser) saveAllUsers(); }, 30000);
    document.addEventListener('touchstart', ()=>{}, {passive: true});
    console.log('⚡ 我独自升级 - 全功能版已运行');
  })();
</script>
</body>
</html>
